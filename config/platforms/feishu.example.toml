# Feishu Platform Configuration Example
# 飞书平台配置示例 - 复制为 feishu.toml 并填写实际值
# Copy to feishu.toml and fill in actual values

# Feishu App Credentials / 飞书应用凭证
app_id = "cli_xxxxxxxxxxxxx"                                           # 飞书应用 ID / Feishu app ID (or use FEISHU_APP_ID env var)
app_secret = "your_feishu_app_secret"                                  # 飞书应用密钥 / Feishu app secret (or use FEISHU_APP_SECRET env var)

# Agent Profile / Agent 人格配置
profile_path = "profiles/assistant.yaml"                               # Agent 人格配置文件路径 / Agent profile path

# Memory / 记忆存储
memory_dir = "examples/feishu_bot/memory"                              # 记忆存储目录 / Memory directory

# Voice Reply / 语音回复
enable_voice_reply = false                                             # 启用语音回复 / Enable voice reply

# Message Collection / 消息收集
message_collect_seconds = 10                                           # 消息收集时间（秒）/ Message collect seconds

# TTS Configuration / 文字转语音配置
[tts]
access_token = "your_volcengine_access_token"                         # Volcengine TTS access token (or use VOLCENGINE_TTS_TOKEN env var)
app_id = "your_volcengine_app_id"                                     # Volcengine app ID (or use VOLCENGINE_TTS_APP_ID env var)
cluster = "volcano_tts"                                                # TTS 集群 / TTS cluster
voice_type = "zh_female_qingxin"                                      # 语音类型 / Voice type
