[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (moderate speed)
    e2e: End-to-end tests (slow)
    live: Tests requiring real credentials (skip by default)
    slow: Slow tests

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings
